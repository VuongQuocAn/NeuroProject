name: neuroproject-tunnel

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuroproject}
      POSTGRES_USER: ${POSTGRES_USER:-neuroproject}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neuro_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neuroproject} -d ${POSTGRES_DB:-neuroproject}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - neuro_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: neuroproject-ai:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.tunnel
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-neuroproject}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-neuroproject}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONPATH: /app
      PORT: ${PORT:-8000}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - neuro_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker:
    image: neuroproject-ai:latest
    restart: unless-stopped
    env_file:
      - .env.tunnel
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-neuroproject}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-neuroproject}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONPATH: /app
    command: celery -A celery_app.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neuro_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  neuro_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
